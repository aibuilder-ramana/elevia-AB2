/* ─── Mock Elevia Assistant (demo mode) ─── */
window.claude = {
  complete: async ({ messages }) => {
    await new Promise(r => setTimeout(r, 1100 + Math.random() * 600));
    const last = (messages.filter(m => m.role === 'user').pop()?.content || '').toLowerCase();
    const data = window.ELEVIA_DATA;
    const enqs = window.__elvStore?.enquiries || [];

    if (/urgent|priority|flag/.test(last)) {
      const urgent = enqs.filter(e => e.urgent);
      if (!urgent.length) return "No enquiries are flagged urgent right now. ✓";
      return urgent.map(e => `- **${e.name}** (${e.id}) · ${e.issues?.join(', ')} · submitted ${new Date(e.createdAt).toLocaleDateString()}`).join('\n');
    }
    if (/new|callback|not.*called|haven't.*called|call.*yet/.test(last)) {
      const uncalled = enqs.filter(e => e.status === 'new');
      if (!uncalled.length) return "All enquiries have been called. ✓";
      return `**${uncalled.length} enquir${uncalled.length===1?'y':'ies'} haven\'t been called yet:**\n\n` +
        uncalled.map(e => `- **${e.name}** (${e.id})${e.urgent?' 🔴 Urgent':''} · ${e.issues?.map(id => data.ISSUES.find(i=>i.id===id)?.label).filter(Boolean).join(', ')} · ${e.insurance}`).join('\n');
    }
    if (/sarah liu|e-1042/.test(last)) {
      const e = enqs.find(e => e.id === 'E-1042') || enqs.find(e => e.name.toLowerCase().includes('sarah'));
      if (!e) return "I don't see Sarah Liu in the current queue.";
      return `**${e.name}** (${e.id}) — ${e.age}yo, anxiety, therapy track.\n\n- **Status:** ${e.status}\n- **Insurance:** ${e.insurance}\n- **Note:** ${e.note || 'No note'}\n- **Timeline:** Enquired ${new Date(e.createdAt).toLocaleDateString()}${e.calledAt ? ', called ' + new Date(e.calledAt).toLocaleDateString() : ''}${e.intakeSentAt ? ', intake sent' : ''}`;
    }
    if (/kapoor|dr\.? r/.test(last)) {
      const doc = data.DOCTORS.find(d => d.id === 'rk');
      const appts = (window.__elvStore?.appointments || []).filter(a => a.doctor === 'rk');
      return `**${doc.name}** · ${doc.title}\n\nFocus: ${doc.focus}\n\n**Upcoming sessions this week:** ${appts.length}\n` +
        appts.map(a => `- ${a.patient} · ${a.type} · ${new Date(a.when).toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'})}`).join('\n');
    }
    if (/intake.*pending|pending.*intake|sent.*intake|waiting|response/.test(last)) {
      const pending = enqs.filter(e => e.status === 'intake-sent');
      if (!pending.length) return "No patients are waiting on intake forms right now.";
      return `**${pending.length} patient${pending.length===1?'':' s'} sent intake but haven\'t responded:**\n\n` +
        pending.map(e => `- **${e.name}** (${e.id}) · sent ${new Date(e.intakeSentAt).toLocaleDateString()}`).join('\n');
    }
    if (/concern|breakdown|anxiety|depression|category|count/.test(last)) {
      const counts = {};
      enqs.forEach(e => (e.issues||[]).forEach(id => { counts[id] = (counts[id]||0)+1; }));
      const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
      return `**Concerns across ${enqs.length} active enquiries:**\n\n` +
        sorted.map(([id,n]) => `- **${data.ISSUES.find(i=>i.id===id)?.label||id}:** ${n} patient${n!==1?'s':''}`).join('\n');
    }
    if (/schedule|appoint|calendar|this week|next week/.test(last)) {
      const appts = window.__elvStore?.appointments || [];
      return `**This week's calendar — ${appts.length} visits:**\n\n` +
        appts.map(a => `- **${a.patient}** · ${a.type} · ${new Date(a.when).toLocaleString(undefined,{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})} · ${data.DOCTORS.find(d=>d.id===a.doctor)?.name||a.doctor}`).join('\n');
    }
    return `I'm looking at the clinic data now.\n\nYou have **${enqs.length} enquiries** total — ${enqs.filter(e=>e.status==='new').length} new, ${enqs.filter(e=>e.status==='called').length} called, ${enqs.filter(e=>e.status==='intake-sent').length} intake pending, ${enqs.filter(e=>e.status==='scheduled').length} scheduled.\n\nAsk me something more specific — e.g. "Who hasn't been called?" or "Summarise Sarah Liu."`;
  }
};

  console.error(e);
}
  </script>
</body>
